name: Training App CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    if: github.event_name == 'pull_request'
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          load: true
          tags: training-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build PWA image
        uses: docker/build-push-action@v5
        with:
          context: ./pwa
          load: true
          tags: training-pwa:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          load: true
          tags: training-mcp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_and_push_to_docker_hub:
    if: github.event_name == 'push'
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Tag previous images
        run: |
          for svc in training-api training-pwa training-mcp; do
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/$svc:latest && \
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/$svc:latest ${{ secrets.DOCKERHUB_USERNAME }}/$svc:previous && \
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/$svc:previous || true
          done
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/training-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push PWA image
        uses: docker/build-push-action@v5
        with:
          context: ./pwa
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/training-pwa:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/training-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger_watchtower:
    if: github.event_name == 'push'
    needs: build_and_push_to_docker_hub
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"

  test_prod:
    if: github.event_name == 'push'
    needs: trigger_watchtower
    runs-on: ubuntu-latest
    steps:
      - name: Wait for watchtower
        run: sleep 30
      - name: Test API health
        run: |
          for i in {1..10}; do
            curl -sf ${{ secrets.PROD_URL }}/api/health && exit 0
            sleep 10
          done
          exit 1

  trigger_rollback:
    needs: [test_prod, build_and_push_to_docker_hub]
    if: always() && needs.test_prod.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Rollback images
        run: |
          for svc in training-api training-pwa training-mcp; do
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/$svc:previous
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/$svc:previous ${{ secrets.DOCKERHUB_USERNAME }}/$svc:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/$svc:latest
          done
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID }}"
