services:
  api:
    build: ./api
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - PORT=3001
      - DATA_DIR=/data
      - API_PASSWORD=${API_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  pwa:
    build: ./pwa
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      api:
        condition: service_healthy

  mcp:
    build: ./mcp
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - ./data:/data
    environment:
      - PORT=3002
      - MCP_API_KEY=${MCP_API_KEY}
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

